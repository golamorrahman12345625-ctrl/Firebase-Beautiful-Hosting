kind = "web"
previewPath = "/"
title = "AL-YAMEN Dashboard"
version = "1.0.0"
id = "artifacts/al-yamen"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25716

[services.development]
run = "pnpm --filter @workspace/al-yamen run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/al-yamen", "run", "build" ]
publicDir = "artifacts/al-yamen/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25716"
BASE_PATH = "/"
