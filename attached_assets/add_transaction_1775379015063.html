<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Transaction</title>
    <style>
        /* ফর্মটিকে সুন্দর দেখানোর জন্য কিছু CSS ডিজাইন */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
        }
        .form-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>নতুন হিসাব যোগ করুন</h2>
        
        <form action="#">
            
            <div class="form-group">
                <label for="date">তারিখ (Date):</label>
                <input type="date" id="date" name="date" required>
            </div>
            
            <div class="form-group">
                <label for="description">বিবরণ (Description):</label>
                <input type="text" id="description" name="description" placeholder="যেমন: বেতন, বাজার খরচ" required>
            </div>
            
            <div class="form-group">
                <label for="amount">টাকার পরিমাণ (Amount):</label>
                <input type="number" id="amount" name="amount" placeholder="0.00" required>
            </div>
            
            <div class="form-group">
                <label for="type">ধরণ (Type):</label>
                <select id="type" name="type">
                    <option value="income">আয় (Income)</option>
                    <option value="expense">ব্যয় (Expense)</option>
                </select>
            </div>
            
            <button type="submit">যোগ করুন</button>
            
        </form>
    </div>

</body>
</html>
